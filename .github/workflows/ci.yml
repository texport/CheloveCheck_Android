name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Assemble
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest :shared:data-core:allTests --no-daemon
      - name: Lint
        run: ./gradlew :app:lintDebug --no-daemon

  synthetic-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dataset_test:
          - dataset_01_100k
          - dataset_02_100k
          - dataset_03_100k
          - dataset_04_100k
          - dataset_05_100k
          - dataset_06_100k
          - dataset_07_100k
          - dataset_08_100k
          - dataset_09_100k
          - dataset_10_100k
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Run synthetic dataset test
        run: ./gradlew :app:testDebugUnitTest --tests "com.chelovecheck.data.analytics.pipeline.LexicalAliasMatcherSyntheticDatasetTest.${{ matrix.dataset_test }}" --no-daemon

  synthetic-aggregate:
    runs-on: ubuntu-latest
    needs: synthetic-matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Run aggregate synthetic summary
        run: ./gradlew :app:testDebugUnitTest --tests "com.chelovecheck.data.analytics.pipeline.LexicalAliasMatcherSyntheticDatasetTest.allDatasets_aggregateSummary_1m" --no-daemon
